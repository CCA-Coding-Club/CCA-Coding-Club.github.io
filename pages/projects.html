<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — CCA Coding Club</title>
  <meta name="description" content="Coding projects for CCA Coding Club members." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="../assets/favicon.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="../css/base/variables.css" />
  <link rel="stylesheet" href="../css/base/reset.css" />
  <link rel="stylesheet" href="../css/components/navbar.css" />
  <link rel="stylesheet" href="../css/components/markdown.css" />
  <link rel="stylesheet" href="../css/pages/browser.css" />

  <!-- Highlight.js — syntax highlighting for code files -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>

  <!-- Marked.js — markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Mammoth.js — .docx to HTML converter -->
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
</head>

<body>

  <!-- Navigation (generated by navbar.js) -->
  <div id="navbar"></div>

  <!-- Page Content -->
  <main class="browser-page">
    <h1>Projects</h1>
    <p>Coding projects organized by language</p>

    <!-- Language Cards -->
    <div id="browser-grid" class="browser-grid"></div>

    <!-- Side-by-side layout: directory left, preview right -->
    <div id="browser-layout" class="browser-layout">

      <!-- File Browser (hidden until a language is selected) -->
      <div id="browser-panel" class="browser-panel">
        <div id="breadcrumbs" class="breadcrumbs"></div>
        <div id="file-list"></div>
      </div>

      <!-- File Preview (hidden until a file is clicked) -->
      <div id="file-preview" class="file-preview">
        <div class="file-preview__header">
          <span class="file-preview__title" id="preview-title"></span>
          <button class="file-preview__close" onclick="closePreview()">✕</button>
        </div>
        <div class="file-preview__body" id="preview-body"></div>
      </div>

    </div>
  </main>

  <!-- Scripts -->
  <script src="../js/components/navbar.js"></script>
  <script>var BROWSER_FOLDER = "Projects";</script>
  <script src="../js/pages/browser.js"></script>

</body>

</html>
