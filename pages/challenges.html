<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Challenges — CCA Coding Club</title>
  <meta name="description" content="Weekly coding challenges for CCA Coding Club members." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="../assets/favicon.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="../css/base/variables.css" />
  <link rel="stylesheet" href="../css/base/reset.css" />
  <link rel="stylesheet" href="../css/components/navbar.css" />
  <link rel="stylesheet" href="../css/components/markdown.css" />
  <link rel="stylesheet" href="../css/pages/challenges.css" />

  <!-- Highlight.js — syntax highlighting for code submissions (~15KB) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/atom-one-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>

  <!-- Marked.js — markdown renderer -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Navigation (generated by navbar.js) -->
  <div id="navbar"></div>

  <!-- Page Content -->
  <main class="challenges-page">
    <h1>Coding Challenges</h1>
    <p>Coding challenges hosted by Alex and Weston</p>

    <!-- Detail Panel (hidden by default, shown when a card is clicked) -->
    <div id="challenge-detail" class="challenge-detail">
      <div class="challenge-detail__top">
        <div>
          <h2 class="challenge-detail__title" id="detail-title"></h2>
          <p class="challenge-detail__date" id="detail-date"></p>
        </div>
        <button class="challenge-detail__close" onclick="closeDetail()">✕</button>
      </div>

      <div class="challenge-detail__body markdown" id="detail-body"></div>

      <div class="actions-bar">
        <button id="toggle-solutions-btn" class="btn" onclick="toggleSolutions()">
          View Solutions
        </button>
      </div>

      <!-- Solutions get injected here by submissions.js -->
      <div id="solutions-container"></div>
    </div>

    <!-- Challenge Cards Grid -->
    <div id="challenges-grid" class="challenges-grid">
      <div class="status-message">Loading challenges...</div>
    </div>
  </main>

  <!-- Firebase (compat SDK — works as regular script tags, no modules needed) -->
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore-compat.js"></script>

  <!-- Our scripts (order matters: firebase-config first, then the rest) -->
  <script src="../js/base/firebase-config.js"></script>
  <script src="../js/components/navbar.js"></script>
  <script src="../js/pages/challenges.js"></script>
  <script src="../js/pages/submissions.js"></script>

</body>
</html>
