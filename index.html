<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCA Coding Club</title>
  <meta name="description" content="Community College of Aurora Coding Club" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base/variables.css" />
  <link rel="stylesheet" href="css/base/reset.css" />
  <link rel="stylesheet" href="css/components/navbar.css" />
  <link rel="stylesheet" href="css/components/markdown.css" />
  <link rel="stylesheet" href="css/pages/info.css" />

  <!-- Marked.js — markdown renderer (8KB gzipped) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- Navigation (generated by navbar.js) -->
  <div id="navbar"></div>

  <!-- Page Content -->
  <main class="info-page">
    <div id="info-content" class="markdown">
      <p class="status-message">Loading...</p>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/components/navbar.js"></script>
  <script src="js/components/markdown.js"></script>
  <script>
    // Load and render the info markdown file
    document.addEventListener("DOMContentLoaded", () => {
      renderMarkdown("content/info.md", "info-content");
    });
  </script>

</body>

</html>
